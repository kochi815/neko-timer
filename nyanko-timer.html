<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>🐱 にゃんこタイマー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Nunito', 'Rounded Mplus 1c', 'Hiragino Maru Gothic Pro', sans-serif;
    color: #5d4157;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    transition: background 0.3s ease;
    background: linear-gradient(135deg, #fff5f9, #fce4ec, #f3e5f5);
  }
  body.flash {
    background: linear-gradient(135deg, #ffe0ec, #ffc1d6);
  }

  @keyframes floatCat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes bounceIn { 0%{transform:scale(1)} 30%{transform:scale(1.25)} 100%{transform:scale(1)} }
  @keyframes riseUp {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity:0.7; }
    25%  { transform: translateY(-25vh) translateX(var(--sway)) rotate(10deg); opacity:0.8; }
    50%  { transform: translateY(-50vh) translateX(calc(var(--sway)*-0.5)) rotate(-8deg); opacity:0.7; }
    75%  { transform: translateY(-75vh) translateX(var(--sway)) rotate(12deg); opacity:0.5; }
    100% { transform: translateY(-110vh) translateX(0) rotate(0deg); opacity:0; }
  }

  #floating-layer {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .floating-cat {
    position: absolute;
    bottom: -10%;
    will-change: transform, opacity;
  }

  #main { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }

  .title { font-size: clamp(14px,3vw,17px); letter-spacing:3px; color:#c48b9f; margin-bottom:10px; font-weight:800; }
  #main-cat {
    font-size: clamp(48px,12vw,64px); line-height:1; margin-bottom:16px;
    filter: drop-shadow(0 4px 12px rgba(200,120,160,0.3));
  }
  #main-cat.running { animation: floatCat 2s ease-in-out infinite; }
  #main-cat.bounce { animation: bounceIn 0.5s ease; }

  .ring-wrap { position: relative; width: 300px; height: 300px; margin-bottom: 28px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill:none; stroke:rgba(220,180,200,0.35); stroke-width:10; }
  .ring-progress { fill:none; stroke-width:10; stroke-linecap:round; transition: none; }
  .ring-progress.normal { stroke:#f48fb1; filter:drop-shadow(0 0 6px #f48fb1); }
  .ring-progress.urgent { stroke:#ff6b8a; filter:drop-shadow(0 0 12px #ff6b8a); }

  .counter-wrap {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  #seconds-display {
    font-size: clamp(80px,20vw,110px); font-weight:900;
    font-variant-numeric: tabular-nums; line-height:1;
    transition: color 0.3s ease;
    color: #5d4157;
  }
  #seconds-display.urgent { color:#ff4572; text-shadow:0 0 20px rgba(255,69,114,0.4); }
  .sec-label { font-size:clamp(13px,2.5vw,16px); color:#c48b9f; margin-top:6px; font-weight:800; letter-spacing:3px; }

  .btn-row { display:flex; gap:14px; margin-bottom:32px; }
  .btn {
    border-radius:50px; font-size:18px; font-weight:800;
    font-family:inherit; cursor:pointer; letter-spacing:2px;
    border:none; outline:none; -webkit-appearance:none;
  }
  .btn-start {
    background:linear-gradient(135deg,#f48fb1,#f06292); color:#fff;
    padding:16px 48px; box-shadow:0 6px 24px rgba(244,143,177,0.4);
  }
  .btn-start:active { transform:scale(0.96); }
  .btn-pause {
    background:rgba(255,255,255,0.7); color:#ad5c7a;
    border:2px solid #f0c0d0; padding:16px 48px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .btn-reset {
    background:rgba(255,255,255,0.5); color:#c48b9f;
    border:2px solid rgba(200,160,180,0.4); padding:16px 28px;
    letter-spacing:1px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }

  .round-box {
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,0.6); border-radius:50px;
    padding:12px 28px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    box-shadow:0 2px 12px rgba(200,120,160,0.15);
  }
  .round-label { font-size:14px; color:#c48b9f; font-weight:800; letter-spacing:2px; }
  #round-num { font-size:32px; font-weight:900; font-variant-numeric:tabular-nums; color:#e91e7e; }

  .hidden { display:none; }
</style>
</head>
<body>

<div id="floating-layer"></div>

<div id="main">
  <div class="title">🐱 にゃんこタイマー 🐱</div>
  <div id="main-cat">😺</div>

  <div class="ring-wrap">
    <svg width="300" height="300" viewBox="0 0 300 300">
      <circle cx="150" cy="150" r="130" class="ring-bg"/>
      <circle cx="150" cy="150" r="130" id="ring" class="ring-progress normal"
        stroke-dasharray="816.814" stroke-dashoffset="0"/>
    </svg>
    <div class="counter-wrap">
      <div id="seconds-display">15</div>
      <div class="sec-label">びょう</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="btn-start" onclick="startTimer()">▶ スタート</button>
    <button class="btn btn-pause hidden" id="btn-pause" onclick="pauseTimer()">⏸ ストップ</button>
    <button class="btn btn-reset" onclick="resetTimer()">↺ リセット</button>
  </div>

  <div class="round-box">
    <span class="round-label">🐾 ラウンド</span>
    <span id="round-num">1</span>
  </div>
</div>

<script>
const TOTAL = 15000;
const CIRC = 2 * Math.PI * 130;
const catEmojis = ["😺","😸","😻","😽","🐱","😹","😼","🙀","😿","😾","🐈","🐈‍⬛"];
const mainCats = ["😺","😸","😻","😽","🐱","😹"];

let timeLeft = TOTAL;
let running = false;
let round = 1;
let catIdx = 0;
let lastTick = 0;
let rafId = null;
let spawnId = null;
let audioCtx = null;

const $sec = document.getElementById('seconds-display');
const $ring = document.getElementById('ring');
const $cat = document.getElementById('main-cat');
const $round = document.getElementById('round-num');
const $start = document.getElementById('btn-start');
const $pause = document.getElementById('btn-pause');
const $floats = document.getElementById('floating-layer');

function beep() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  [660,880,1046].forEach((f,i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0.12, now+i*0.15);
    g.gain.exponentialRampToValueAtTime(0.001, now+i*0.15+0.14);
    o.connect(g).connect(audioCtx.destination);
    o.start(now+i*0.15); o.stop(now+i*0.15+0.15);
  });
}

function render() {
  const s = Math.ceil(Math.max(0, timeLeft) / 1000);
  const progress = 1 - timeLeft / TOTAL;
  const urgent = s <= 3 && running;
  $sec.textContent = s;
  $sec.className = urgent ? 'urgent' : '';
  $ring.setAttribute('stroke-dashoffset', CIRC * (1 - progress));
  $ring.className.baseVal = 'ring-progress ' + (urgent ? 'urgent' : 'normal');
}

function tick() {
  const now = performance.now();
  const delta = now - lastTick;
  lastTick = now;
  timeLeft -= delta;
  if (timeLeft <= 0) {
    beep();
    round++;
    catIdx = (catIdx + 1) % mainCats.length;
    $round.textContent = round;
    $cat.textContent = mainCats[catIdx];
    $cat.className = 'bounce';
    setTimeout(() => { if (running) $cat.className = 'running'; }, 500);
    document.body.classList.add('flash');
    setTimeout(() => document.body.classList.remove('flash'), 350);
    timeLeft = TOTAL + timeLeft;
  }
  render();
  rafId = requestAnimationFrame(tick);
}

function spawnCat() {
  const el = document.createElement('div');
  el.className = 'floating-cat';
  const emoji = catEmojis[Math.floor(Math.random()*catEmojis.length)];
  const left = Math.random()*90+5;
  const size = Math.random()*24+20;
  const dur = Math.random()*4+5;
  const delay = Math.random()*0.5;
  const sway = (Math.random()-0.5)*80;
  el.textContent = emoji;
  el.style.left = left+'%';
  el.style.fontSize = size+'px';
  el.style.setProperty('--sway', sway+'px');
  el.style.animation = `riseUp ${dur}s ease-out ${delay}s forwards`;
  if (size < 28) el.style.filter = 'blur(1px)';
  $floats.appendChild(el);
  setTimeout(() => el.remove(), (dur+delay)*1000+500);
}

function startTimer() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  running = true;
  lastTick = performance.now();
  rafId = requestAnimationFrame(tick);
  $start.classList.add('hidden');
  $pause.classList.remove('hidden');
  $cat.className = 'running';
  spawnCat();
  spawnId = setInterval(spawnCat, 800);
}

function pauseTimer() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (spawnId) clearInterval(spawnId);
  $pause.classList.add('hidden');
  $start.classList.remove('hidden');
  $start.textContent = '▶ つづき';
  $cat.className = '';
}

function resetTimer() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (spawnId) clearInterval(spawnId);
  timeLeft = TOTAL; round = 1; catIdx = 0;
  $round.textContent = 1;
  $cat.textContent = '😺';
  $cat.className = '';
  $pause.classList.add('hidden');
  $start.classList.remove('hidden');
  $start.textContent = '▶ スタート';
  document.body.classList.remove('flash');
  $floats.innerHTML = '';
  render();
}

render();
</script>
</body>
</html>
